    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBPQxZvBmsJQ4kGxnWWBPs1pwRZnB8i3VE",
            authDomain: "g00gleauthen-2afqo4.firebaseapp.com",
            projectId: "g00gleauthen-2afqo4",
            storageBucket: "g00gleauthen-2afqo4.appspot.com",
            messagingSenderId: "151985888576",
            appId: "1:151985888576:web:g00gleauthen-2afqo4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Rankings ticker helpers
        let _tickerRaf = null; 
        let _lastTs = 0; 
        const _tickerSpeedPxPerSec = 40;
        
        function _startTickerLoop(){
            const c = document.getElementById('rankings-ticker');
            const a = document.getElementById('ticker-track-a');
            const b = document.getElementById('ticker-track-b');
            if(!c||!a||!b) return;
            a.style.animation = 'none'; 
            b.style.animation = 'none';
            c.scrollLeft = 0; 
            _lastTs = 0;
            const step = (ts)=>{
                if(!_lastTs) _lastTs = ts;
                const dt = Math.min((ts - _lastTs)/1000, 0.05);
                _lastTs = ts;
                const width = a.scrollWidth || 1;
                c.scrollLeft = (c.scrollLeft + _tickerSpeedPxPerSec * dt) % width;
                _tickerRaf = requestAnimationFrame(step);
            };
            if(_tickerRaf) cancelAnimationFrame(_tickerRaf);
            _tickerRaf = requestAnimationFrame(step);
        }
        
        function renderTicker(users){
            const a = document.getElementById('ticker-track-a');
            const b = document.getElementById('ticker-track-b');
            if(!a||!b) return;
            const items = users.map((u,i)=>{
                const name = (u.displayName||'Student').toString().slice(0,18);
                const school = (u.school||'').toString().slice(0,18);
                const schoolSuffix = school ? ` • ${school}` : '';
                return `<span class="ticker-item">⚡ #${i+1} <span class="font-semibold">${name}</span>${schoolSuffix}</span>`;
            }).join('');
            a.innerHTML = items; 
            b.innerHTML = items;
            _startTickerLoop();
        }

        // UI helpers
        function show(el){ if(el) el.classList.remove('hidden'); }
        function hide(el){ if(el) el.classList.add('hidden'); }
        function setText(el, txt){ el.textContent = txt; }

        // Theme management
        function initTheme(){ 
            const t=localStorage.getItem('theme')||'light'; 
            document.documentElement.classList.toggle('dark', t==='dark'); 
            updateThemeUI(t); 
        }
        
        function toggleTheme(){ 
            const isDark=document.documentElement.classList.toggle('dark'); 
            const t=isDark?'dark':'light'; 
            localStorage.setItem('theme',t); 
            updateThemeUI(t); 
        }
        
        function updateThemeUI(t){
            document.getElementById('sun-icon').classList.toggle('hidden', t!=='dark');
            document.getElementById('moon-icon').classList.toggle('hidden', t==='dark');
        }

        // User profile management
        function loadUserProfile() {
            try {
                const userData = JSON.parse(localStorage.getItem('userData') || '{}');
                const displayName = userData.displayName || 'User';
                const initials = displayName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                
                document.getElementById('user-initials').textContent = initials;
                document.getElementById('user-name').textContent = displayName;
                
                const phone = userData.phone || userData.phoneNumber || '+0000000000';
                const school = userData.school || '';
                document.getElementById('dropdown-phone').textContent = school ? `${phone} • ${school}` : phone;
            } catch (error) {
                console.error('Error loading user profile:', error);
            }
        }

        function toggleProfileDropdown() {
            document.getElementById('profile-dropdown').classList.toggle('hidden');
        }

        async function logout() {
            try {
                localStorage.removeItem('userData');
                localStorage.removeItem('selectedYear');
                localStorage.removeItem('selectedSubject');
                localStorage.removeItem('redirectAfterLogin');
                
                try {
                    await auth.signOut();
                } catch (firebaseError) {
                    console.log('Firebase logout failed, continuing with localStorage logout');
                }
                
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Error logging out:', error);
                window.location.href = 'index.html';
            }
        }

        // News management
        function createNewsCard(news) {
            const categoryColors = {
                'exam-updates': 'bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200',
                'study-tips': 'bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200',
                'announcements': 'bg-purple-100 dark:bg-purple-900 text-purple-800 dark:text-purple-200',
                'general': 'bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200'
            };
            
            const categoryColor = categoryColors[news.category] || categoryColors.general;
            const date = new Date(news.timestamp?.toDate ? news.timestamp.toDate() : news.timestamp).toLocaleDateString();
            
            return `
                <div class="news-card bg-white dark:bg-gray-800 rounded-xl shadow-sm p-6">
                    ${news.image ? `
                        <div class="mb-4 overflow-hidden rounded-lg">
                            <img src="${news.image}" alt="${news.title}" class="news-image w-full h-48 object-cover">
                        </div>
                    ` : ''}
                    <div class="flex items-center justify-between mb-3">
                        <span class="news-badge px-3 py-1 ${categoryColor} rounded-full text-xs font-medium">
                            ${news.category.replace('-', ' ').replace(/\b\w/g, l => l.toUpperCase())}
                        </span>
                        <span class="text-xs text-gray-500 dark:text-gray-400">${date}</span>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-2 line-clamp-2">${news.title}</h3>
                    <p class="text-gray-600 dark:text-gray-400 text-sm line-clamp-3 mb-4">${news.excerpt}</p>
                    <button onclick="readMore('${news.id}')" class="text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 text-sm font-medium">
                        Read More →
                    </button>
                </div>
            `;
        }

            hide(newsGrid);

            const mockNews = [

        function readMore(newsId) {
            // Implement news detail view
            alert(`Opening news article ${newsId}. This would navigate to a detailed view.`);
        }

        // AI Chatbot - Already loaded via script tag
        document.addEventListener('DOMContentLoaded', () => {
            // Check if AI chatbot loaded successfully
            if (typeof AIChatbot !== 'undefined') {
                console.log('AI Chatbot loaded successfully');
            } else {
                console.warn('AI Chatbot failed to load');
            }
        });

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            loadUserProfile();
            loadNews();
            
            // Live rankings stream
            try{
                const q = db.collection('users').orderBy('totalScore','desc').limit(20);
                q.onSnapshot((snap)=>{
                    const users = snap.docs.map(d=>d.data());
                    renderTicker(users);
                });
            }catch(_){/* ignore */}
            
            // Event listeners
            document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
            document.getElementById('profile-dropdown-btn').addEventListener('click', toggleProfileDropdown);
            document.getElementById('logout-btn').addEventListener('click', logout);
            
            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#profile-dropdown-btn')) {
                    document.getElementById('profile-dropdown').classList.add('hidden');
                }
            });
            
            // Category filter buttons
            document.querySelectorAll('.news-badge').forEach(button => {
                button.addEventListener('click', () => {
                    // Remove active state from all buttons
                    document.querySelectorAll('.news-badge').forEach(btn => {
                        btn.classList.remove('bg-blue-100', 'dark:bg-blue-900', 'text-blue-800', 'dark:text-blue-200');
                        btn.classList.add('bg-gray-100', 'dark:bg-gray-700', 'text-gray-800', 'dark:text-gray-200');
                    });
                    
                    // Add active state to clicked button
                    button.classList.remove('bg-gray-100', 'dark:bg-gray-700', 'text-gray-800', 'dark:text-gray-200');
                    button.classList.add('bg-blue-100', 'dark:bg-blue-900', 'text-blue-800', 'dark:text-blue-200');
                    
                    // Filter news (implement based on category)
                    const category = button.textContent.toLowerCase().replace(' ', '-');
                    console.log(`Filtering by category: ${category}`);
                });
            });
        });
    </script>
