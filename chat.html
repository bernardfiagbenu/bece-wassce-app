    <script type="module">
        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, orderBy, onSnapshot, serverTimestamp, addDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBPQxZvBmsJQ4kGxnWWBPs1pwRZnB8i3VE",
            authDomain: "g00gleauthen-2afqo4.firebaseapp.com",
            projectId: "g00gleauthen-2afqo4",
            storageBucket: "g00gleauthen-2afqo4.appspot.com",
            messagingSenderId: "151985888576",
            appId: "1:151985888576:web:g00gleauthen-2afqo4"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Chat System
        class ChatSystem {
            constructor() {
                this.currentUser = null;
                this.selectedUser = null;
                this.users = [];
                this.messages = [];
                this.unsubscribeUsers = null;
                this.unsubscribeMessages = null;
                this.unsubscribeTyping = null;
                
                this.initializeEventListeners();
                this.checkAuth();
            }

            initializeEventListeners() {
                // Theme toggle
                document.getElementById('theme-toggle').addEventListener('click', this.toggleTheme.bind(this));
                
                // Profile dropdown
                document.getElementById('profile-dropdown-btn').addEventListener('click', this.toggleProfileDropdown.bind(this));
                document.getElementById('logout-btn').addEventListener('click', this.logout.bind(this));
                
                // User search
                document.getElementById('user-search').addEventListener('input', this.filterUsers.bind(this));
                
                // Message form
                document.getElementById('message-form').addEventListener('submit', this.sendMessage.bind(this));
                
                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('#profile-dropdown-btn')) {
                        document.getElementById('profile-dropdown').classList.add('hidden');
                    }
                });
            }

            checkAuth() {
                // Check if user is logged in using localStorage (your existing auth method)
                const userData = localStorage.getItem('userData');
                if (userData) {
                    try {
                        const user = JSON.parse(userData);
                        this.currentUser = {
                            uid: user.uid || user.phone || user.phoneNumber,
                            displayName: user.displayName,
                            phone: user.phone || user.phoneNumber
                        };
                        this.loadUserProfile();
                        this.loadUsers();
                    } catch (error) {
                        console.error('Error parsing user data:', error);
                        this.redirectToLogin();
                    }
                } else {
                    this.redirectToLogin();
                }
            }

            redirectToLogin() {
                // Store the intended destination
                localStorage.setItem('redirectAfterLogin', 'chat.html');
                window.location.href = 'index.html';
            }

            async loadUserProfile() {
                try {
                    // Use localStorage data first, then try to fetch from Firestore
                    const userData = JSON.parse(localStorage.getItem('userData') || '{}');
                    const displayName = userData.displayName || 'User';
                    const initials = this.getInitials(displayName);
                    
                    document.getElementById('user-initials').textContent = initials;
                    document.getElementById('user-name').textContent = displayName;
                    
                    // Update dropdown phone
                    const phone = userData.phone || userData.phoneNumber || '+0000000000';
                    const school = userData.school || '';
                    document.getElementById('dropdown-phone').textContent = school ? `${phone} • ${school}` : phone;

                    // Try to fetch additional data from Firestore if needed
                    try {
                        const userDoc = await getDoc(doc(db, 'users', this.currentUser.uid));
                        if (userDoc.exists()) {
                            const firestoreData = userDoc.data();
                            // Update with any missing data from Firestore
                            if (!userData.school && firestoreData.school) {
                                userData.school = firestoreData.school;
                                localStorage.setItem('userData', JSON.stringify(userData));
                                document.getElementById('dropdown-phone').textContent = `${phone} • ${firestoreData.school}`;
                            }
                        }
                    } catch (firestoreError) {
                        console.log('Could not fetch from Firestore, using localStorage data');
                    }
                } catch (error) {
                    console.error('Error loading user profile:', error);
                }
            }

            async loadUsers() {
                try {
                    // Ensure we have a valid user ID
                    if (!this.currentUser || !this.currentUser.uid) {
                        console.error('No valid user ID found');
                        this.redirectToLogin();
                        return;
                    }

                    // Listen to users collection
                    const usersRef = collection(db, 'users');
                    const q = query(usersRef, orderBy('displayName'));
                    
                    this.unsubscribeUsers = onSnapshot(q, (snapshot) => {
                        this.users = snapshot.docs
                            .map(doc => ({ id: doc.id, ...doc.data() }))
                            .filter(user => user.id !== this.currentUser.uid); // Exclude current user
                        
                        this.renderUsers();
                    }, (error) => {
                        console.error('Error loading users:', error);
                        // Show a fallback message
                        const usersList = document.getElementById('users-list');
                        if (usersList) {
                            usersList.innerHTML = `
                                <div class="p-4 text-center text-gray-500 dark:text-gray-400">
                                    <p>Unable to load users. Please check your connection.</p>
                                    <button onclick="location.reload()" class="mt-2 px-4 py-2 bg-blue-600 text-white rounded-lg">
                                        Retry
                                    </button>
                                </div>
                            `;
                        }
                    });
                } catch (error) {
                    console.error('Error loading users:', error);
                    // Show error message
                    const usersList = document.getElementById('users-list');
                    if (usersList) {
                        usersList.innerHTML = `
                            <div class="p-4 text-center text-gray-500 dark:text-gray-400">
                                <p>Error loading users. Please try again.</p>
                                <button onclick="location.reload()" class="mt-2 px-4 py-2 bg-blue-600 text-white rounded-lg">
                                    Retry
                                </button>
                            </div>
                        `;
                    }
                }
            }

            renderUsers() {
                const usersList = document.getElementById('users-list');
                const searchTerm = document.getElementById('user-search').value.toLowerCase();
                
                const filteredUsers = this.users.filter(user => 
                    user.displayName?.toLowerCase().includes(searchTerm) ||
                    user.school?.toLowerCase().includes(searchTerm)
                );

                usersList.innerHTML = filteredUsers.map(user => `
                    <div class="user-item p-3 hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer border-b border-gray-100 dark:border-gray-700" data-user-id="${user.id}">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white font-medium">
                                ${this.getInitials(user.displayName || 'User')}
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center space-x-2">
                                    <h4 class="text-sm font-medium text-gray-900 dark:text-white truncate">
                                        ${user.displayName || 'User'}
                                    </h4>
                                    <div class="online-indicator ${user.online ? 'online' : 'offline'}"></div>
                                </div>
                                <p class="text-xs text-gray-500 dark:text-gray-400 truncate">
                                    ${user.school || 'No school'}
                                </p>
                            </div>
                        </div>
                    </div>
                `).join('');

                // Add click listeners
                usersList.querySelectorAll('.user-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const userId = item.dataset.userId;
                        this.selectUser(userId);
                    });
                });
            }

            filterUsers() {
                this.renderUsers();
            }

            selectUser(userId) {
                this.selectedUser = this.users.find(user => user.id === userId);
                if (!this.selectedUser) return;

                // Update UI
                document.getElementById('welcome-message').classList.add('hidden');
                document.getElementById('chat-header').classList.remove('hidden');
                document.getElementById('messages-container').classList.remove('hidden');
                document.getElementById('message-input-container').classList.remove('hidden');

                // Update chat header
                const displayName = this.selectedUser.displayName || 'User';
                document.getElementById('chat-user-initials').textContent = this.getInitials(displayName);
                document.getElementById('chat-user-name').textContent = displayName;
                
                const isOnline = this.selectedUser.online || false;
                document.getElementById('chat-user-status').className = `online-indicator ${isOnline ? 'online' : 'offline'}`;
                document.getElementById('chat-user-status-text').textContent = isOnline ? 'Online' : 'Offline';

                // Load messages
                this.loadMessages();
            }

            async loadMessages() {
                if (!this.selectedUser) return;

                // Unsubscribe from previous messages
                if (this.unsubscribeMessages) {
                    this.unsubscribeMessages();
                }

                try {
                    const chatId = this.getChatId(this.currentUser.uid, this.selectedUser.id);
                    const messagesRef = collection(db, 'chats', chatId, 'messages');
                    const q = query(messagesRef, orderBy('timestamp', 'asc'));

                    this.unsubscribeMessages = onSnapshot(q, (snapshot) => {
                        this.messages = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        this.renderMessages();
                    });
                } catch (error) {
                    console.error('Error loading messages:', error);
                }
            }

            renderMessages() {
                const messagesList = document.getElementById('messages-list');
                
                messagesList.innerHTML = this.messages.map(message => {
                    const isOwn = message.senderId === this.currentUser.uid;
                    const timestamp = message.timestamp?.toDate ? message.timestamp.toDate() : new Date(message.timestamp);
                    const timeString = timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    return `
                        <div class="flex ${isOwn ? 'justify-end' : 'justify-start'}">
                            <div class="message-bubble ${isOwn ? 'sent' : 'received'} rounded-lg px-4 py-2 max-w-xs lg:max-w-md">
                                <p class="text-sm">${message.text}</p>
                                <p class="text-xs ${isOwn ? 'text-blue-100' : 'text-gray-500 dark:text-gray-400'} mt-1">${timeString}</p>
                            </div>
                        </div>
                    `;
                }).join('');

                // Scroll to bottom
                messagesList.scrollTop = messagesList.scrollHeight;
            }

            async sendMessage(e) {
                e.preventDefault();
                
                if (!this.selectedUser) return;

                const input = document.getElementById('message-input');
                const text = input.value.trim();
                
                if (!text) return;

                try {
                    const chatId = this.getChatId(this.currentUser.uid, this.selectedUser.id);
                    const messagesRef = collection(db, 'chats', chatId, 'messages');
                    
                    await addDoc(messagesRef, {
                        text: text,
                        senderId: this.currentUser.uid,
                        senderName: this.currentUser.displayName || 'User',
                        timestamp: serverTimestamp()
                    });

                    // Clear input
                    input.value = '';
                } catch (error) {
                    console.error('Error sending message:', error);
                }
            }

            getChatId(userId1, userId2) {
                // Create consistent chat ID regardless of who initiates
                return [userId1, userId2].sort().join('_');
            }

            getInitials(name) {
                return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            }

            toggleTheme() {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                this.updateThemeIcons(isDark);
            }

            updateThemeIcons(isDark) {
                const sunIcon = document.getElementById('sun-icon');
                const moonIcon = document.getElementById('moon-icon');
                
                if (isDark) {
                    sunIcon.classList.remove('hidden');
                    moonIcon.classList.add('hidden');
                } else {
                    sunIcon.classList.add('hidden');
                    moonIcon.classList.remove('hidden');
                }
            }

            toggleProfileDropdown() {
                document.getElementById('profile-dropdown').classList.toggle('hidden');
            }

            async logout() {
                try {
                    // Clear localStorage (your existing logout method)
                    localStorage.removeItem('userData');
                    localStorage.removeItem('selectedYear');
                    localStorage.removeItem('selectedSubject');
                    localStorage.removeItem('redirectAfterLogin');
                    
                    // Try Firebase logout as well
                    try {
                        await signOut(auth);
                    } catch (firebaseError) {
                        console.log('Firebase logout failed, continuing with localStorage logout');
                    }
                    
                    window.location.href = 'index.html';
                } catch (error) {
                    console.error('Error logging out:', error);
                    // Force redirect even if there's an error
                    window.location.href = 'index.html';
                }
            }
        }

        // Initialize theme
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.classList.toggle('dark', savedTheme === 'dark');
        }

        // AI Chatbot - Already loaded via script tag
        document.addEventListener('DOMContentLoaded', () => {
            // Check if AI chatbot loaded successfully
            if (typeof AIChatbot !== 'undefined') {
                console.log('AI Chatbot loaded successfully');
            } else {
                console.warn('AI Chatbot failed to load');
            }
        });

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            
            // Add debug mode
            const debugMode = localStorage.getItem('debug') === 'true';
            if (debugMode) {
                console.log('Chat System Debug Mode Enabled');
                console.log('User Data:', localStorage.getItem('userData'));
                console.log('Redirect After Login:', localStorage.getItem('redirectAfterLogin'));
            }
            
            try {
                new ChatSystem();
            } catch (error) {
                console.error('Error initializing Chat System:', error);
                // Show error message to user
                const main = document.querySelector('main');
                if (main) {
                    main.innerHTML = `
                        <div class="flex items-center justify-center min-h-screen">
                            <div class="text-center">
                                <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-2">Error Loading Chat</h3>
                                <p class="text-gray-500 dark:text-gray-400 mb-4">Something went wrong. Please try again.</p>
                                <button onclick="location.reload()" class="px-4 py-2 bg-blue-600 text-white rounded-lg">
                                    Reload Page
                                </button>
                            </div>
                        </div>
                    `;
                }
            }
        });
    </script>
    
    <!-- AI Chatbot Script -->
    <script src="ai-chatbot.js"></script>
</body>
</html>
